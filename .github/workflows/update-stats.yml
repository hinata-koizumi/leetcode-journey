name: Update LeetCode Statistics

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate and apply statistics
        run: python scripts/update_statistics.py

      - name: Commit updated README if needed
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update LeetCode statistics in README"
          git push
